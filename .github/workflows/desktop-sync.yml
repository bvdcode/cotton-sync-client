name: Desktop Sync

on:
  push:
    tags:
      - "v*"
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      package_target:
        description: "Package target to build for this manual run."
        required: false
        default: quick-checks
        type: choice
        options:
          - quick-checks
          - all
          - desktop-windows
          - desktop-linux
          - cli-windows
      publish_release:
        description: "Publish or update the GitHub Release from this run."
        required: false
        default: false
        type: boolean

concurrency:
  group: desktop-sync-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && inputs.package_target || 'push' }}-${{ github.event_name == 'workflow_dispatch' && inputs.publish_release || false }}
  cancel-in-progress: true

jobs:
  build-budget-guard:
    name: Build Budget Guard
    if: (github.event_name == 'push' && github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')) || (github.event_name == 'workflow_dispatch' && !inputs.publish_release && inputs.package_target == 'quick-checks')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Explain package build policy
        run: |
          cat <<'EOF'
          Package builds are intentionally skipped for this run.

          Pushes to main and v* tags produce and publish release assets automatically.

          Use workflow_dispatch with package_target=desktop-windows, desktop-linux,
          cli-windows, or all when an artifact is actually needed.

          Use publish_release=true when release assets must be produced and
          published from a manual run.
          EOF

  linux:
    name: Desktop Linux Package Smoke
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && (inputs.publish_release || inputs.package_target == 'all' || inputs.package_target == 'desktop-linux'))
    runs-on: ubuntu-latest
    outputs:
      Version: ${{ steps.gitversion.outputs.SemVer }}
    permissions:
      contents: read
    steps:
      - name: check repository
        uses: actions/checkout@v5
        with:
          lfs: "true"
          fetch-depth: 0

      - name: Determine Version
        id: gitversion
        shell: pwsh
        run: ./.github/scripts/determine-version.ps1

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install desktop Linux smoke dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dbus-x11 ffmpeg gnome-keyring libnotify-bin libsecret-tools x11-apps x11-utils xauth xvfb
          command -v dbus-run-session
          command -v ffmpeg
          command -v gnome-keyring-daemon
          command -v notify-send
          command -v secret-tool
          command -v xprop
          command -v xwd
          command -v xwininfo
          command -v xvfb-run

      - name: Restore desktop project
        run: dotnet restore src/Cotton.Sync.Desktop/Cotton.Sync.Desktop.csproj

      - name: Publish desktop Linux x64
        run: dotnet publish src/Cotton.Sync.Desktop/Cotton.Sync.Desktop.csproj /p:PublishProfile=linux-x64 -p:Version='${{ steps.gitversion.outputs.SemVer }}' -p:AssemblyVersion='${{ steps.gitversion.outputs.AssemblyVersion }}' -p:FileVersion='${{ steps.gitversion.outputs.FileVersion }}' -p:InformationalVersion='${{ steps.gitversion.outputs.SemVer }}'

      - name: Smoke desktop Linux self-test
        run: |
          xvfb-run -a -s "-screen 0 1024x768x24" \
            dbus-run-session -- bash -euo pipefail <<'EOF'
          temp_dir="$(mktemp -d)"
          self_test_timeout=120s
          trap 'rm -rf "$temp_dir"' EXIT
          . src/Cotton.Sync.Desktop/Packaging/linux/start-secret-service.sh
          src/Cotton.Sync.Desktop/Packaging/linux/verify-checksums.sh \
            src/Cotton.Sync.Desktop/bin/Release/net10.0/publish/linux-x64
          timeout "$self_test_timeout" src/Cotton.Sync.Desktop/bin/Release/net10.0/publish/linux-x64/Cotton.Sync.Desktop --self-test --data-dir "$temp_dir"
          EOF

      - name: Smoke desktop Linux GUI screenshot
        run: |
          xvfb-run -a -s "-screen 0 1024x768x24" \
            dbus-run-session -- bash -euo pipefail <<'EOF'
          . src/Cotton.Sync.Desktop/Packaging/linux/start-secret-service.sh
          src/Cotton.Sync.Desktop/Packaging/linux/smoke-gui-screenshot-matrix.sh \
            src/Cotton.Sync.Desktop/bin/Release/net10.0/publish/linux-x64/Cotton.Sync.Desktop \
            .
          EOF

      - name: Upload desktop Linux GUI screenshot
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: desktop-linux-gui-screenshot
          path: |
            cotton-sync-desktop-linux-*.png
            cotton-sync-desktop-linux-*.png.log
          if-no-files-found: ignore

      - name: Package desktop Linux x64 archive
        run: tar -czf cotton-sync-desktop-linux-x64-${{ steps.gitversion.outputs.SemVer }}.tar.gz -C src/Cotton.Sync.Desktop/bin/Release/net10.0/publish/linux-x64 .

      - name: Package desktop Linux x64 deb
        run: |
          src/Cotton.Sync.Desktop/Packaging/linux/package-deb.sh \
            src/Cotton.Sync.Desktop/bin/Release/net10.0/publish/linux-x64 \
            cotton-sync-desktop-linux-x64-${{ steps.gitversion.outputs.SemVer }}.deb \
            '${{ steps.gitversion.outputs.SemVer }}'

      - name: Smoke desktop Linux archive artifact
        run: |
          xvfb-run -a -s "-screen 0 1024x768x24" \
            dbus-run-session -- bash -euo pipefail <<'EOF'
          temp_dir="$(mktemp -d)"
          trap 'rm -rf "$temp_dir"' EXIT
          extract_dir="$temp_dir/archive"
          data_dir="$temp_dir/data"
          self_test_timeout=120s
          mkdir -p "$extract_dir" "$data_dir"
          tar -xzf cotton-sync-desktop-linux-x64-${{ steps.gitversion.outputs.SemVer }}.tar.gz -C "$extract_dir"
          src/Cotton.Sync.Desktop/Packaging/linux/verify-checksums.sh "$extract_dir"
          . src/Cotton.Sync.Desktop/Packaging/linux/start-secret-service.sh
          timeout "$self_test_timeout" "$extract_dir/Cotton.Sync.Desktop" --self-test --data-dir "$data_dir"
          src/Cotton.Sync.Desktop/Packaging/linux/smoke-diagnostics-export.sh \
            "$extract_dir/Cotton.Sync.Desktop" \
            "$data_dir"
          EOF

      - name: Smoke desktop Linux deb artifact
        run: |
          xvfb-run -a -s "-screen 0 1024x768x24" \
            dbus-run-session -- bash -euo pipefail <<'EOF'
          temp_dir="$(mktemp -d)"
          trap 'rm -rf "$temp_dir"' EXIT
          extract_dir="$temp_dir/deb"
          data_dir="$temp_dir/data"
          self_test_timeout=120s
          mkdir -p "$extract_dir" "$data_dir"
          dpkg-deb -x cotton-sync-desktop-linux-x64-${{ steps.gitversion.outputs.SemVer }}.deb "$extract_dir"
          test -f "$extract_dir/usr/share/applications/cotton-sync.desktop"
          test -f "$extract_dir/usr/share/icons/hicolor/192x192/apps/cotton-sync.png"
          test -L "$extract_dir/usr/bin/cotton-sync"
          src/Cotton.Sync.Desktop/Packaging/linux/verify-checksums.sh "$extract_dir/opt/cotton-sync"
          . src/Cotton.Sync.Desktop/Packaging/linux/start-secret-service.sh
          timeout "$self_test_timeout" "$extract_dir/opt/cotton-sync/Cotton.Sync.Desktop" --self-test --data-dir "$data_dir"
          EOF

      - name: Smoke desktop Linux deb install
        run: |
          sudo dpkg -i cotton-sync-desktop-linux-x64-${{ steps.gitversion.outputs.SemVer }}.deb
          cleanup() {
            sudo dpkg -r cotton-sync-desktop >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          test -x /opt/cotton-sync/Cotton.Sync.Desktop
          test -L /usr/bin/cotton-sync
          src/Cotton.Sync.Desktop/Packaging/linux/verify-checksums.sh /opt/cotton-sync
          mkdir -p "$HOME/.config/autostart"
          cat > "$HOME/.config/autostart/cotton-sync.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Cotton Sync
          Exec=/opt/cotton-sync/Cotton.Sync.Desktop
          X-GNOME-Autostart-enabled=true
          EOF

          xvfb-run -a -s "-screen 0 1024x768x24" \
            dbus-run-session -- bash -euo pipefail <<'EOF'
          temp_dir="$(mktemp -d)"
          self_test_timeout=120s
          trap 'rm -rf "$temp_dir"' EXIT
          . src/Cotton.Sync.Desktop/Packaging/linux/start-secret-service.sh
          timeout "$self_test_timeout" /opt/cotton-sync/Cotton.Sync.Desktop --self-test --data-dir "$temp_dir"
          src/Cotton.Sync.Desktop/Packaging/linux/smoke-diagnostics-export.sh \
            /opt/cotton-sync/Cotton.Sync.Desktop \
            "$temp_dir"
          EOF

          sudo dpkg -r cotton-sync-desktop
          trap - EXIT
          test ! -e /opt/cotton-sync/Cotton.Sync.Desktop
          test ! -e /usr/bin/cotton-sync
          test ! -e "$HOME/.config/autostart/cotton-sync.desktop"

      - name: Smoke desktop Linux deb upgrade
        run: |
          old_deb="$RUNNER_TEMP/cotton-sync-desktop-linux-x64-old.deb"
          src/Cotton.Sync.Desktop/Packaging/linux/package-deb.sh \
            src/Cotton.Sync.Desktop/bin/Release/net10.0/publish/linux-x64 \
            "$old_deb" \
            0.0.1-ci-upgrade

          sudo dpkg -i "$old_deb"
          cleanup() {
            sudo dpkg -r cotton-sync-desktop >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          mkdir -p "$HOME/.config/autostart"
          cat > "$HOME/.config/autostart/cotton-sync.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Cotton Sync
          Exec=/opt/cotton-sync/Cotton.Sync.Desktop
          X-GNOME-Autostart-enabled=true
          EOF

          sudo dpkg -i cotton-sync-desktop-linux-x64-${{ steps.gitversion.outputs.SemVer }}.deb
          src/Cotton.Sync.Desktop/Packaging/linux/verify-checksums.sh /opt/cotton-sync
          installed_version="$(dpkg-query -W -f='${Version}' cotton-sync-desktop)"
          if [ "$installed_version" != "${{ steps.gitversion.outputs.SemVer }}" ]; then
            echo "Expected upgraded package version ${{ steps.gitversion.outputs.SemVer }}, got $installed_version." >&2
            exit 1
          fi

          xvfb-run -a -s "-screen 0 1024x768x24" \
            dbus-run-session -- bash -euo pipefail <<'EOF'
          temp_dir="$(mktemp -d)"
          self_test_timeout=120s
          trap 'rm -rf "$temp_dir"' EXIT
          . src/Cotton.Sync.Desktop/Packaging/linux/start-secret-service.sh
          timeout "$self_test_timeout" /opt/cotton-sync/Cotton.Sync.Desktop --self-test --data-dir "$temp_dir"
          src/Cotton.Sync.Desktop/Packaging/linux/smoke-diagnostics-export.sh \
            /opt/cotton-sync/Cotton.Sync.Desktop \
            "$temp_dir"
          EOF

          sudo dpkg -r cotton-sync-desktop
          trap - EXIT
          test ! -e /opt/cotton-sync/Cotton.Sync.Desktop
          test ! -e /usr/bin/cotton-sync
          test ! -e "$HOME/.config/autostart/cotton-sync.desktop"

      - name: Upload desktop Linux x64 artifact
        uses: actions/upload-artifact@v5
        with:
          name: desktop-linux-x64
          path: |
            cotton-sync-desktop-linux-x64-${{ steps.gitversion.outputs.SemVer }}.tar.gz
            cotton-sync-desktop-linux-x64-${{ steps.gitversion.outputs.SemVer }}.deb

  windows:
    name: Desktop Windows Package Smoke
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && (inputs.publish_release || inputs.package_target == 'all' || inputs.package_target == 'desktop-windows'))
    runs-on: windows-latest
    outputs:
      Version: ${{ steps.gitversion.outputs.SemVer }}
    permissions:
      contents: read
    steps:
      - name: check repository
        uses: actions/checkout@v5
        with:
          lfs: "true"
          fetch-depth: 0

      - name: Determine Version
        id: gitversion
        shell: pwsh
        run: ./.github/scripts/determine-version.ps1

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Restore desktop project
        run: dotnet restore src/Cotton.Sync.Desktop/Cotton.Sync.Desktop.csproj

      - name: Publish desktop Windows x64
        run: dotnet publish src/Cotton.Sync.Desktop/Cotton.Sync.Desktop.csproj /p:PublishProfile=win-x64 -p:Version='${{ steps.gitversion.outputs.SemVer }}' -p:AssemblyVersion='${{ steps.gitversion.outputs.AssemblyVersion }}' -p:FileVersion='${{ steps.gitversion.outputs.FileVersion }}' -p:InformationalVersion='${{ steps.gitversion.outputs.SemVer }}'

      - name: Smoke desktop Windows self-test
        timeout-minutes: 4
        shell: pwsh
        run: |
          $dataDir = Join-Path $env:RUNNER_TEMP "cotton-sync-smoke"
          New-Item -ItemType Directory -Path $dataDir -Force | Out-Null
          & "src/Cotton.Sync.Desktop/Packaging/windows/verify-checksums.ps1" `
            -PublishDirectory "src/Cotton.Sync.Desktop/bin/Release/net10.0/publish/win-x64"
          & "src/Cotton.Sync.Desktop/Packaging/windows/verify-associated-icon.ps1" `
            -AppExecutable "src/Cotton.Sync.Desktop/bin/Release/net10.0/publish/win-x64/Cotton.Sync.Desktop.exe" `
            -ExpectedIcon "src/Cotton.Sync.Desktop/Assets/app.ico"
          & "src/Cotton.Sync.Desktop/Packaging/windows/verify-version-metadata.ps1" `
            -Executable "src/Cotton.Sync.Desktop/bin/Release/net10.0/publish/win-x64/Cotton.Sync.Desktop.exe" `
            -ExpectedProductVersion "${{ steps.gitversion.outputs.SemVer }}" `
            -Label "desktop publish executable"
          src/Cotton.Sync.Desktop/bin/Release/net10.0/publish/win-x64/Cotton.Sync.Desktop.exe --self-test --data-dir "$dataDir"

      - name: Package desktop Windows x64 archive
        run: tar -czf cotton-sync-desktop-win-x64-${{ steps.gitversion.outputs.SemVer }}.tar.gz -C src/Cotton.Sync.Desktop/bin/Release/net10.0/publish/win-x64 .

      - name: Package desktop Windows x64 zip
        run: >
          python src/Cotton.Sync.Desktop/Packaging/windows/package-zip.py
          src/Cotton.Sync.Desktop/bin/Release/net10.0/publish/win-x64
          cotton-sync-desktop-win-x64-${{ steps.gitversion.outputs.SemVer }}.zip

      - name: Smoke desktop Windows zip archive
        timeout-minutes: 5
        shell: pwsh
        run: |
          $extractDir = Join-Path $env:RUNNER_TEMP "cotton-sync-win-zip"
          $dataDir = Join-Path $env:RUNNER_TEMP "cotton-sync-win-zip-data"
          New-Item -ItemType Directory -Path $extractDir -Force | Out-Null
          New-Item -ItemType Directory -Path $dataDir -Force | Out-Null
          Expand-Archive cotton-sync-desktop-win-x64-${{ steps.gitversion.outputs.SemVer }}.zip -DestinationPath $extractDir -Force
          & "src/Cotton.Sync.Desktop/Packaging/windows/verify-checksums.ps1" `
            -PublishDirectory $extractDir
          & "src/Cotton.Sync.Desktop/Packaging/windows/verify-associated-icon.ps1" `
            -AppExecutable (Join-Path $extractDir "Cotton.Sync.Desktop.exe") `
            -ExpectedIcon "src/Cotton.Sync.Desktop/Assets/app.ico"
          & "src/Cotton.Sync.Desktop/Packaging/windows/verify-version-metadata.ps1" `
            -Executable (Join-Path $extractDir "Cotton.Sync.Desktop.exe") `
            -ExpectedProductVersion "${{ steps.gitversion.outputs.SemVer }}" `
            -Label "desktop zip executable"
          & (Join-Path $extractDir "Cotton.Sync.Desktop.exe") --self-test --data-dir "$dataDir"
          & "src/Cotton.Sync.Desktop/Packaging/windows/smoke-diagnostics-export.ps1" `
            -AppExecutable (Join-Path $extractDir "Cotton.Sync.Desktop.exe") `
            -DataDirectory $dataDir `
            -ExpectedAppVersion "${{ steps.gitversion.outputs.SemVer }}"

      - name: Install Inno Setup
        timeout-minutes: 10
        shell: pwsh
        run: |
          choco install innosetup --yes --no-progress
          $compiler = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $compiler)) {
            throw "Inno Setup compiler was not found at $compiler"
          }

          "INNO_SETUP_COMPILER=$compiler" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Package desktop Windows installer
        timeout-minutes: 5
        shell: pwsh
        run: |
          $publishDir = Resolve-Path "src/Cotton.Sync.Desktop/bin/Release/net10.0/publish/win-x64"
          $iconFile = Resolve-Path "src/Cotton.Sync.Desktop/Assets/app.ico"
          $outputDir = Resolve-Path "."
          $installerName = "cotton-sync-desktop-win-x64-${{ steps.gitversion.outputs.SemVer }}-setup.exe"
          & "$env:INNO_SETUP_COMPILER" `
            "/DSourceDir=$publishDir" `
            "/DIconFile=$iconFile" `
            "/DOutputDir=$outputDir" `
            "/DAppVersion=${{ steps.gitversion.outputs.SemVer }}" `
            "/DOutputBaseFilename=cotton-sync-desktop-win-x64-${{ steps.gitversion.outputs.SemVer }}-setup" `
            "src/Cotton.Sync.Desktop/Packaging/windows/cotton-sync.iss"

          if (-not (Test-Path $installerName)) {
            throw "Windows installer was not created."
          }

      - name: Smoke desktop Windows installer
        timeout-minutes: 8
        shell: pwsh
        run: |
          $installDir = Join-Path $env:RUNNER_TEMP "cotton-sync-installed"
          $dataDir = Join-Path $env:RUNNER_TEMP "cotton-sync-installer-data"
          $installLog = Join-Path $env:RUNNER_TEMP "cotton-sync-install.log"
          $uninstallLog = Join-Path $env:RUNNER_TEMP "cotton-sync-uninstall.log"
          $reinstallLog = Join-Path $env:RUNNER_TEMP "cotton-sync-reinstall.log"
          $reinstallUninstallLog = Join-Path $env:RUNNER_TEMP "cotton-sync-reinstall-uninstall.log"
          New-Item -ItemType Directory -Path $dataDir -Force | Out-Null
          $installerPath = ".\cotton-sync-desktop-win-x64-${{ steps.gitversion.outputs.SemVer }}-setup.exe"

          $install = Start-Process `
            -FilePath $installerPath `
            -ArgumentList @("/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/SP-", "/TASKS=", "/DIR=$installDir", "/LOG=$installLog") `
            -Wait `
            -PassThru
          if ($install.ExitCode -ne 0) {
            Get-Content $installLog -ErrorAction SilentlyContinue
            throw "Windows installer exited with code $($install.ExitCode)."
          }

          $installedExe = Join-Path $installDir "Cotton.Sync.Desktop.exe"
          if (-not (Test-Path $installedExe)) {
            Get-ChildItem $installDir -Recurse -ErrorAction SilentlyContinue
            throw "Installed desktop executable was not found."
          }
          & "src/Cotton.Sync.Desktop/Packaging/windows/verify-version-metadata.ps1" `
            -Executable $installedExe `
            -ExpectedProductVersion "${{ steps.gitversion.outputs.SemVer }}" `
            -Label "installed desktop executable"

          $startMenuShortcut = Join-Path ([Environment]::GetFolderPath("Programs")) "Cotton Sync\Cotton Sync.lnk"
          $startMenuUninstallShortcut = Join-Path ([Environment]::GetFolderPath("Programs")) "Cotton Sync\Uninstall Cotton Sync.lnk"
          if (-not (Test-Path $startMenuShortcut)) {
            throw "Installed Start Menu shortcut was not found."
          }
          if (-not (Test-Path $startMenuUninstallShortcut)) {
            throw "Installed Start Menu uninstall shortcut was not found."
          }
          $runKey = "HKCU:\Software\Microsoft\Windows\CurrentVersion\Run"
          $runValue = (Get-ItemProperty -Path $runKey -Name "Cotton Sync" -ErrorAction SilentlyContinue)."Cotton Sync"
          $expectedRunValue = "`"$installedExe`" --start-minimized"
          if ($runValue -ne $expectedRunValue) {
            throw "Autostart registry value was not installed correctly. Expected '$expectedRunValue', got '$runValue'."
          }

          & "src/Cotton.Sync.Desktop/Packaging/windows/smoke-autostart-launch.ps1" `
            -AppExecutable $installedExe
          & "src/Cotton.Sync.Desktop/Packaging/windows/verify-shortcut-app-id.ps1" `
            -ShortcutPath $startMenuShortcut `
            -ExpectedAppUserModelId "Cotton.Sync.Desktop"
          & "src/Cotton.Sync.Desktop/Packaging/windows/smoke-notification-identity.ps1" `
            -AppExecutable $installedExe `
            -DataDirectory (Join-Path $env:RUNNER_TEMP "cotton-sync-notification-identity-data")
          & "src/Cotton.Sync.Desktop/Packaging/windows/smoke-start-menu-launch.ps1" `
            -ShortcutPath $startMenuShortcut `
            -ExpectedExecutablePath $installedExe
          & "src/Cotton.Sync.Desktop/Packaging/windows/smoke-cloud-files-self-test-truthfulness.ps1" `
            -AppExecutable $installedExe `
            -DataDirectory $dataDir `
            -VfsSmokeDataDirectory (Join-Path $env:RUNNER_TEMP "cotton-sync-vfs-self-test-truthfulness-data")
          & "src/Cotton.Sync.Desktop/Packaging/windows/verify-checksums.ps1" `
            -PublishDirectory $installDir
          & "src/Cotton.Sync.Desktop/Packaging/windows/verify-associated-icon.ps1" `
            -AppExecutable $installedExe `
            -ExpectedIcon "src/Cotton.Sync.Desktop/Assets/app.ico"
          & "src/Cotton.Sync.Desktop/Packaging/windows/smoke-diagnostics-export.ps1" `
            -AppExecutable $installedExe `
            -DataDirectory $dataDir `
            -ExpectedAppVersion "${{ steps.gitversion.outputs.SemVer }}"
          & "src/Cotton.Sync.Desktop/Packaging/windows/smoke-update-discovery.ps1" `
            -AppExecutable $installedExe `
            -DataDirectory (Join-Path $env:RUNNER_TEMP "cotton-sync-update-discovery-data")
          & "src/Cotton.Sync.Desktop/Packaging/windows/smoke-update-visual-states.ps1" `
            -AppExecutable $installedExe `
            -DataRoot (Join-Path $env:RUNNER_TEMP "cotton-sync-update-visual-states-data")

          $uninstaller = Join-Path $installDir "unins000.exe"
          if (-not (Test-Path $uninstaller)) {
            throw "Windows uninstaller was not found."
          }

          $uninstall = Start-Process `
            -FilePath $uninstaller `
            -ArgumentList @("/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/LOG=$uninstallLog") `
            -Wait `
            -PassThru
          if ($uninstall.ExitCode -ne 0) {
            Get-Content $uninstallLog -ErrorAction SilentlyContinue
            throw "Windows uninstaller exited with code $($uninstall.ExitCode)."
          }

          if (Test-Path $installedExe) {
            Get-ChildItem $installDir -Recurse -ErrorAction SilentlyContinue
            throw "Installed desktop executable remained after uninstall."
          }
          if (Test-Path $startMenuShortcut) {
            throw "Start Menu shortcut remained after uninstall."
          }
          if (Test-Path $startMenuUninstallShortcut) {
            throw "Start Menu uninstall shortcut remained after uninstall."
          }
          $runValue = (Get-ItemProperty -Path $runKey -Name "Cotton Sync" -ErrorAction SilentlyContinue)."Cotton Sync"
          if ($runValue) {
            throw "Autostart registry value remained after uninstall."
          }
          $remainingInstallItems = @(Get-ChildItem -Path $installDir -Force -Recurse -ErrorAction SilentlyContinue)
          if ($remainingInstallItems.Count -ne 0) {
            $remainingInstallItems | ForEach-Object { Write-Host $_.FullName }
            throw "Install directory was not empty after uninstall."
          }

          $reinstall = Start-Process `
            -FilePath $installerPath `
            -ArgumentList @("/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/SP-", "/TASKS=", "/DIR=$installDir", "/LOG=$reinstallLog") `
            -Wait `
            -PassThru
          if ($reinstall.ExitCode -ne 0) {
            Get-Content $reinstallLog -ErrorAction SilentlyContinue
            throw "Windows reinstall exited with code $($reinstall.ExitCode)."
          }
          if (-not (Test-Path $installedExe)) {
            throw "Reinstalled desktop executable was not found."
          }
          & $installedExe --self-test --data-dir "$dataDir"

          $reinstallUninstaller = Join-Path $installDir "unins000.exe"
          if (-not (Test-Path $reinstallUninstaller)) {
            throw "Windows uninstaller was not found after reinstall."
          }
          $reinstallUninstall = Start-Process `
            -FilePath $reinstallUninstaller `
            -ArgumentList @("/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/LOG=$reinstallUninstallLog") `
            -Wait `
            -PassThru
          if ($reinstallUninstall.ExitCode -ne 0) {
            Get-Content $reinstallUninstallLog -ErrorAction SilentlyContinue
            throw "Windows reinstall cleanup exited with code $($reinstallUninstall.ExitCode)."
          }
          $remainingInstallItems = @(Get-ChildItem -Path $installDir -Force -Recurse -ErrorAction SilentlyContinue)
          if ($remainingInstallItems.Count -ne 0) {
            $remainingInstallItems | ForEach-Object { Write-Host $_.FullName }
            throw "Install directory was not empty after reinstall cleanup."
          }

      - name: Smoke desktop Windows installer upgrade
        timeout-minutes: 8
        shell: pwsh
        run: |
          $publishDir = Resolve-Path "src/Cotton.Sync.Desktop/bin/Release/net10.0/publish/win-x64"
          $iconFile = Resolve-Path "src/Cotton.Sync.Desktop/Assets/app.ico"
          $oldOutputDir = Join-Path $env:RUNNER_TEMP "cotton-sync-old-installer"
          $installDir = Join-Path $env:RUNNER_TEMP "cotton-sync-upgrade-installed"
          $dataDir = Join-Path $env:RUNNER_TEMP "cotton-sync-upgrade-data"
          $installLog = Join-Path $env:RUNNER_TEMP "cotton-sync-upgrade-install.log"
          $upgradeLog = Join-Path $env:RUNNER_TEMP "cotton-sync-upgrade-current.log"
          $uninstallLog = Join-Path $env:RUNNER_TEMP "cotton-sync-upgrade-uninstall.log"
          New-Item -ItemType Directory -Path $oldOutputDir -Force | Out-Null
          New-Item -ItemType Directory -Path $dataDir -Force | Out-Null

          & "$env:INNO_SETUP_COMPILER" `
            "/DSourceDir=$publishDir" `
            "/DIconFile=$iconFile" `
            "/DOutputDir=$oldOutputDir" `
            "/DAppVersion=0.0.1-ci-upgrade" `
            "/DOutputBaseFilename=cotton-sync-desktop-win-x64-0.0.1-ci-upgrade-setup" `
            "src/Cotton.Sync.Desktop/Packaging/windows/cotton-sync.iss"

          $oldInstaller = Join-Path $oldOutputDir "cotton-sync-desktop-win-x64-0.0.1-ci-upgrade-setup.exe"
          if (-not (Test-Path $oldInstaller)) {
            throw "Old Windows installer was not created."
          }

          $oldInstall = Start-Process `
            -FilePath $oldInstaller `
            -ArgumentList @("/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/SP-", "/TASKS=", "/DIR=$installDir", "/LOG=$installLog") `
            -Wait `
            -PassThru
          if ($oldInstall.ExitCode -ne 0) {
            Get-Content $installLog -ErrorAction SilentlyContinue
            throw "Old Windows installer exited with code $($oldInstall.ExitCode)."
          }

          $installedExe = Join-Path $installDir "Cotton.Sync.Desktop.exe"
          if (-not (Test-Path $installedExe)) {
            throw "Old installed desktop executable was not found."
          }
          $currentInstallerPath = ".\cotton-sync-desktop-win-x64-${{ steps.gitversion.outputs.SemVer }}-setup.exe"

          $currentInstall = Start-Process `
            -FilePath $currentInstallerPath `
            -ArgumentList @("/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/SP-", "/TASKS=", "/DIR=$installDir", "/LOG=$upgradeLog") `
            -Wait `
            -PassThru
          if ($currentInstall.ExitCode -ne 0) {
            Get-Content $upgradeLog -ErrorAction SilentlyContinue
            throw "Current Windows installer exited with code $($currentInstall.ExitCode)."
          }

          $startMenuShortcut = Join-Path ([Environment]::GetFolderPath("Programs")) "Cotton Sync\Cotton Sync.lnk"
          $startMenuUninstallShortcut = Join-Path ([Environment]::GetFolderPath("Programs")) "Cotton Sync\Uninstall Cotton Sync.lnk"
          if (-not (Test-Path $startMenuShortcut)) {
            throw "Upgraded Start Menu shortcut was not found."
          }
          if (-not (Test-Path $startMenuUninstallShortcut)) {
            throw "Upgraded Start Menu uninstall shortcut was not found."
          }
          $runKey = "HKCU:\Software\Microsoft\Windows\CurrentVersion\Run"
          $runValue = (Get-ItemProperty -Path $runKey -Name "Cotton Sync" -ErrorAction SilentlyContinue)."Cotton Sync"
          $expectedRunValue = "`"$installedExe`" --start-minimized"
          if ($runValue -ne $expectedRunValue) {
            throw "Upgraded autostart registry value was not installed correctly. Expected '$expectedRunValue', got '$runValue'."
          }

          & "src/Cotton.Sync.Desktop/Packaging/windows/smoke-autostart-launch.ps1" `
            -AppExecutable $installedExe
          & "src/Cotton.Sync.Desktop/Packaging/windows/verify-shortcut-app-id.ps1" `
            -ShortcutPath $startMenuShortcut `
            -ExpectedAppUserModelId "Cotton.Sync.Desktop"
          & $installedExe --self-test --data-dir "$dataDir"
          & "src/Cotton.Sync.Desktop/Packaging/windows/verify-checksums.ps1" `
            -PublishDirectory $installDir
          & "src/Cotton.Sync.Desktop/Packaging/windows/verify-associated-icon.ps1" `
            -AppExecutable $installedExe `
            -ExpectedIcon "src/Cotton.Sync.Desktop/Assets/app.ico"
          & "src/Cotton.Sync.Desktop/Packaging/windows/smoke-diagnostics-export.ps1" `
            -AppExecutable $installedExe `
            -DataDirectory $dataDir `
            -ExpectedAppVersion "${{ steps.gitversion.outputs.SemVer }}"

          $uninstaller = Join-Path $installDir "unins000.exe"
          if (-not (Test-Path $uninstaller)) {
            throw "Windows uninstaller was not found after upgrade."
          }

          $uninstall = Start-Process `
            -FilePath $uninstaller `
            -ArgumentList @("/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/LOG=$uninstallLog") `
            -Wait `
            -PassThru
          if ($uninstall.ExitCode -ne 0) {
            Get-Content $uninstallLog -ErrorAction SilentlyContinue
            throw "Windows upgraded app uninstaller exited with code $($uninstall.ExitCode)."
          }

          if (Test-Path $installedExe) {
            Get-ChildItem $installDir -Recurse -ErrorAction SilentlyContinue
            throw "Upgraded desktop executable remained after uninstall."
          }
          if (Test-Path $startMenuShortcut) {
            throw "Upgraded Start Menu shortcut remained after uninstall."
          }
          if (Test-Path $startMenuUninstallShortcut) {
            throw "Upgraded Start Menu uninstall shortcut remained after uninstall."
          }
          $runValue = (Get-ItemProperty -Path $runKey -Name "Cotton Sync" -ErrorAction SilentlyContinue)."Cotton Sync"
          if ($runValue) {
            throw "Upgraded autostart registry value remained after uninstall."
          }

      - name: Upload desktop Windows x64 artifact
        uses: actions/upload-artifact@v5
        with:
          name: desktop-win-x64
          path: |
            cotton-sync-desktop-win-x64-${{ steps.gitversion.outputs.SemVer }}.tar.gz
            cotton-sync-desktop-win-x64-${{ steps.gitversion.outputs.SemVer }}.zip

      - name: Upload desktop Windows installer artifact
        uses: actions/upload-artifact@v5
        with:
          name: desktop-windows-installer
          path: cotton-sync-desktop-win-x64-${{ steps.gitversion.outputs.SemVer }}-setup.exe

  cli-windows:
    name: Sync CLI Windows Package Smoke
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && (inputs.publish_release || inputs.package_target == 'all' || inputs.package_target == 'cli-windows'))
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: check repository
        uses: actions/checkout@v5
        with:
          lfs: "true"
          fetch-depth: 0

      - name: Determine Version
        id: gitversion
        shell: pwsh
        run: ./.github/scripts/determine-version.ps1

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore CLI project
        run: dotnet restore src/Cotton.Sync.Cli/Cotton.Sync.Cli.csproj

      - name: Publish sync CLI Windows x64
        run: dotnet publish src/Cotton.Sync.Cli/Cotton.Sync.Cli.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false -p:PublishTrimmed=false -p:PublishReadyToRun=false -p:Version='${{ steps.gitversion.outputs.SemVer }}' -p:AssemblyVersion='${{ steps.gitversion.outputs.AssemblyVersion }}' -p:FileVersion='${{ steps.gitversion.outputs.FileVersion }}' -p:InformationalVersion='${{ steps.gitversion.outputs.SemVer }}' -o src/Cotton.Sync.Cli/bin/Release/net10.0/publish/win-x64

      - name: Smoke sync CLI Windows package
        shell: pwsh
        run: |
          $publishDir = Resolve-Path "src/Cotton.Sync.Cli/bin/Release/net10.0/publish/win-x64"
          $cliExe = Join-Path $publishDir "Cotton.Sync.Cli.exe"
          if (-not (Test-Path $cliExe)) {
            throw "Published CLI executable was not found: $cliExe."
          }
          & "src/Cotton.Sync.Desktop/Packaging/windows/verify-version-metadata.ps1" `
            -Executable $cliExe `
            -ExpectedProductVersion "${{ steps.gitversion.outputs.SemVer }}" `
            -Label "CLI publish executable"

          $help = & $cliExe --help
          if ($LASTEXITCODE -ne 0) {
            throw "CLI help exited with code $LASTEXITCODE."
          }
          foreach ($command in @("auth-browser", "state-summary", "sync-once", "sync-soak")) {
            if (-not ($help -match [regex]::Escape($command))) {
              throw "CLI help did not list command: $command."
            }
          }

          $version = & $cliExe --version
          if ($LASTEXITCODE -ne 0) {
            throw "CLI version exited with code $LASTEXITCODE."
          }
          if (-not ($version -match "^[0-9]+\.[0-9]+\.[0-9]+")) {
            throw "CLI version output was not a product version: $version"
          }

          $dataDir = Join-Path $env:RUNNER_TEMP "cotton-sync-cli-smoke"
          New-Item -ItemType Directory -Path $dataDir -Force | Out-Null
          $database = Join-Path $dataDir "sync-state.db"
          $syncPair = "11111111-2222-4333-8444-555555555555"
          $summary = & $cliExe state-summary --database $database --sync-pair $syncPair
          if ($LASTEXITCODE -ne 0) {
            throw "CLI state-summary exited with code $LASTEXITCODE."
          }
          if (-not ($summary -match "Entries: 0")) {
            throw "CLI state-summary did not report an empty database."
          }

      - name: Package sync CLI Windows x64 zip
        shell: pwsh
        run: |
          $publishDir = Resolve-Path "src/Cotton.Sync.Cli/bin/Release/net10.0/publish/win-x64"
          Compress-Archive -Path (Join-Path $publishDir "*") -DestinationPath "cotton-sync-cli-win-x64-${{ steps.gitversion.outputs.SemVer }}.zip" -Force

      - name: Smoke sync CLI Windows zip archive
        shell: pwsh
        run: |
          $extractDir = Join-Path $env:RUNNER_TEMP "cotton-sync-cli-win-zip"
          Expand-Archive "cotton-sync-cli-win-x64-${{ steps.gitversion.outputs.SemVer }}.zip" -DestinationPath $extractDir -Force
          $cliExe = Join-Path $extractDir "Cotton.Sync.Cli.exe"
          if (-not (Test-Path $cliExe)) {
            throw "CLI executable was not found in the release zip."
          }
          & "src/Cotton.Sync.Desktop/Packaging/windows/verify-version-metadata.ps1" `
            -Executable $cliExe `
            -ExpectedProductVersion "${{ steps.gitversion.outputs.SemVer }}" `
            -Label "CLI zip executable"
          & $cliExe --help | Out-Host
          if ($LASTEXITCODE -ne 0) {
            throw "CLI archive help exited with code $LASTEXITCODE."
          }

      - name: Upload sync CLI Windows x64 artifact
        uses: actions/upload-artifact@v5
        with:
          name: sync-cli-windows-x64
          path: cotton-sync-cli-win-x64-${{ steps.gitversion.outputs.SemVer }}.zip

  release-checksums:
    name: Desktop Release Artifact Checksums
    runs-on: ubuntu-latest
    needs:
      - linux
      - windows
      - cli-windows
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
    permissions:
      contents: read
    steps:
      - name: Download desktop Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-linux-x64
          path: downloaded/desktop-linux-x64

      - name: Download desktop Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-win-x64
          path: downloaded/desktop-win-x64

      - name: Download desktop Windows installer artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-windows-installer
          path: downloaded/desktop-windows-installer

      - name: Download sync CLI Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: sync-cli-windows-x64
          path: downloaded/sync-cli-windows-x64

      - name: Generate desktop release artifact checksums
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp downloaded/desktop-linux-x64/* release-assets/
          cp downloaded/desktop-win-x64/* release-assets/
          cp downloaded/desktop-windows-installer/* release-assets/
          cp downloaded/sync-cli-windows-x64/* release-assets/
          asset_count="$(find release-assets -maxdepth 1 -type f ! -name '*.sha256' | wc -l | tr -d ' ')"
          if [ "$asset_count" != "6" ]; then
            find release-assets -maxdepth 1 -type f -print | sort
            echo "Expected 6 desktop release assets, found $asset_count." >&2
            exit 1
          fi
          (
            cd release-assets
            find . -maxdepth 1 -type f ! -name '*.sha256' -print0 |
              sort -z |
              xargs -0 -r sha256sum
          ) > release-artifact-checksums.sha256
          cat release-artifact-checksums.sha256

      - name: Upload desktop release artifact checksums
        uses: actions/upload-artifact@v5
        with:
          name: release-artifact-checksums
          path: release-artifact-checksums.sha256

  release:
    name: Publish Sync Client Release
    runs-on: ubuntu-latest
    needs:
      - linux
      - windows
      - cli-windows
      - release-checksums
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
    permissions:
      contents: write
    steps:
      - name: check repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download desktop Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-linux-x64
          path: release-assets

      - name: Download desktop Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-win-x64
          path: release-assets

      - name: Download desktop Windows installer artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-windows-installer
          path: release-assets

      - name: Download sync CLI Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: sync-cli-windows-x64
          path: release-assets

      - name: Download desktop release artifact checksums
        uses: actions/download-artifact@v4
        with:
          name: release-artifact-checksums
          path: release-assets

      - name: Normalize desktop release asset names
        shell: bash
        run: |
          set -euo pipefail
          mv release-assets/cotton-sync-desktop-linux-x64-*.deb release-assets/CottonSync-Linux.deb
          mv release-assets/cotton-sync-desktop-linux-x64-*.tar.gz release-assets/CottonSync-Linux.tar.gz
          mv release-assets/cotton-sync-desktop-win-x64-*-setup.exe release-assets/CottonSync-Windows-Setup.exe
          mv release-assets/cotton-sync-desktop-win-x64-*.tar.gz release-assets/CottonSync-Windows.tar.gz
          mv release-assets/cotton-sync-desktop-win-x64-*.zip release-assets/CottonSync-Windows.zip
          mv release-assets/cotton-sync-cli-win-x64-*.zip release-assets/CottonSync-CLI-Windows.zip
          (
            cd release-assets
            find . -maxdepth 1 -type f ! -name '*.sha256' -print0 |
              sort -z |
              xargs -0 -r sha256sum
          ) > release-assets/release-artifact-checksums.sha256
          cat release-assets/release-artifact-checksums.sha256

      - name: Prepare release metadata
        id: release_metadata
        shell: bash
        run: |
          set -euo pipefail
          version='${{ needs.linux.outputs.Version }}'
          tag="v${version}"
          prerelease="false"

          asset_count="$(find release-assets -maxdepth 1 -type f ! -name 'release-manifest.json' | wc -l | tr -d ' ')"
          if [ "$asset_count" != "7" ]; then
            find release-assets -maxdepth 1 -type f -print | sort
            echo "Expected 7 release files before manifest, found $asset_count." >&2
            exit 1
          fi

          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          version = os.environ["RELEASE_VERSION"]
          tag = os.environ["RELEASE_TAG"]
          repository = os.environ["GITHUB_REPOSITORY"]
          server_url = os.environ["GITHUB_SERVER_URL"]
          release_url = f"{server_url}/{repository}/releases/tag/{tag}"
          release_download_url = f"{server_url}/{repository}/releases/download/{tag}"
          assets_dir = Path("release-assets")
          assets = []
          for path in sorted(assets_dir.iterdir(), key=lambda item: item.name):
              if not path.is_file() or path.name == "release-manifest.json":
                  continue
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              assets.append(
                  {
                      "name": path.name,
                      "sha256": digest,
                      "sizeBytes": path.stat().st_size,
                      "url": f"{release_download_url}/{path.name}",
                  }
              )

          manifest = {
              "schemaVersion": 1,
              "product": "Cotton Sync",
              "version": version,
              "tag": tag,
              "commit": os.environ["GITHUB_SHA"],
              "branch": os.environ["GITHUB_REF_NAME"],
              "releaseUrl": release_url,
              "assets": assets,
          }
          (assets_dir / "release-manifest.json").write_text(
              json.dumps(manifest, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          find release-assets -maxdepth 1 -type f -print | sort
        env:
          RELEASE_VERSION: ${{ needs.linux.outputs.Version }}
          RELEASE_TAG: v${{ needs.linux.outputs.Version }}

      - name: Delete stale release assets
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release_metadata.outputs.tag }}"
          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $tag does not exist yet; no stale assets to delete."
            exit 0
          fi

          allowed_names=$'CottonSync-CLI-Windows.zip\nCottonSync-Linux.deb\nCottonSync-Linux.tar.gz\nCottonSync-Windows-Setup.exe\nCottonSync-Windows.tar.gz\nCottonSync-Windows.zip\nrelease-manifest.json\nrelease-artifact-checksums.sha256'
          gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json assets \
            --jq '.assets[].name' |
            while IFS= read -r asset_name; do
              if ! grep -Fxq "$asset_name" <<< "$allowed_names"; then
                echo "Deleting stale release asset: $asset_name"
                gh release delete-asset "$tag" "$asset_name" --repo "$GITHUB_REPOSITORY" --yes
              fi
            done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.linux.outputs.Version }}"
          tag="${{ steps.release_metadata.outputs.tag }}"
          previous_tag="$(git tag --merged "$GITHUB_SHA" --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | awk -v current="$tag" '$0 != current { print; exit }')"
          changes_file="$(mktemp)"

          if [ -n "$previous_tag" ]; then
            git log --no-merges --pretty=format:'- %s (`%h`)' "$previous_tag..$GITHUB_SHA" > "$changes_file"
            changelog_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/compare/${previous_tag}...${tag}"
          else
            git log --no-merges --max-count=50 --pretty=format:'- %s (`%h`)' "$GITHUB_SHA" > "$changes_file"
            changelog_url=""
          fi

          {
            echo "## Cotton Sync Client ${version}"
            echo
            echo "- Version: \`${version}\`"
            echo "- Branch: \`${GITHUB_REF_NAME}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo
            echo "## Changes"
            echo
            if [ -s "$changes_file" ]; then
              cat "$changes_file"
              echo
            else
              echo "- Release packaging refresh."
            fi

            if [ -n "$changelog_url" ]; then
              echo
              echo "[Full changelog](${changelog_url})"
            fi

            echo
            echo "## Assets"
            echo
            find release-assets -maxdepth 1 -type f -exec basename {} \; | sort | sed 's/^/- `/;s/$/`/'
          } > release-notes.md

          cat release-notes.md

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.release_metadata.outputs.tag }}
          commit: ${{ github.sha }}
          name: Cotton Sync Client ${{ needs.linux.outputs.Version }}
          bodyFile: release-notes.md
          artifacts: "release-assets/*"
          artifactErrorsFailBuild: true
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          prerelease: ${{ steps.release_metadata.outputs.prerelease }}
          token: ${{ secrets.GITHUB_TOKEN }}

  github-release-upgrade-windows:
    name: Desktop GitHub Release Upgrade Smoke
    runs-on: windows-latest
    needs:
      - linux
      - release
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
    permissions:
      contents: read
    steps:
      - name: check repository
        uses: actions/checkout@v5
        with:
          lfs: "true"

      - name: Install Inno Setup
        timeout-minutes: 10
        shell: pwsh
        run: |
          choco install innosetup --yes --no-progress
          $compiler = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $compiler)) {
            throw "Inno Setup compiler was not found at $compiler"
          }

          "INNO_SETUP_COMPILER=$compiler" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Smoke GitHub release Windows installer upgrade
        shell: pwsh
        run: |
          & "src/Cotton.Sync.Desktop/Packaging/windows/smoke-github-release-upgrade.ps1" `
            -ExpectedAppVersion "${{ needs.linux.outputs.Version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
